<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Minecraft</title>
    <!-- Use CheerpJ 3 again but this time with a different approach or just wait longer. Actually, let's just stick to CheerpJ 3 -->
    <script src="https://cjrtnc.leaningtech.com/3.0/cj3loader.js"></script>
    <style>
      body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
      #cheerpjDisplay { width: 100vw; height: 100vh; position: absolute; z-index: 1; pointer-events: none; }
      #lwjgl { width: 100vw; height: 100vh; position: absolute; z-index: 2; display: block; }
    </style>
  </head>
  <body>
    <canvas id="lwjgl"></canvas>
    <div id="cheerpjDisplay"></div>
    <script>
      async function main() {
        let basePath = window.location.pathname;
        if (!basePath.endsWith('/')) {
            basePath = basePath.substring(0, basePath.lastIndexOf('/') + 1);
        }

        await cheerpjInit({
            javaProperties: ["java.library.path=/app" + basePath + "lib"]
        });
        cheerpjCreateDisplay(-1, -1, document.getElementById("cheerpjDisplay"));

        const mcJar = "/app" + basePath + "minecraft.jar";
        const lwjglJar = "/app" + basePath + "lib/lwjgl.jar";
        const lwjglUtilJar = "/app" + basePath + "lib/lwjgl_util.jar";
        const jinputJar = "/app" + basePath + "lib/jinput.jar";

        window.lwjglCanvasElement = document.getElementById("lwjgl");

        await cheerpjRunMain("net.minecraft.client.Minecraft", mcJar + ":" + lwjglJar + ":" + lwjglUtilJar + ":" + jinputJar);
      }
      main();
    </script>
  </body>
</html>
